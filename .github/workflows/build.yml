name: Build CallGuard

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # lets you trigger a build manually from the Actions tab

jobs:
  exe:
    name: Build Windows .exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyinstaller pandas matplotlib
      - name: Build CallGuard.exe
        run: >
          pyinstaller --onefile --windowed --name CallGuard
          --paths analysis --paths google_voice
          --hidden-import analyze_calls --hidden-import gvoice_to_csv
          --collect-all pandas --collect-all matplotlib
          callguard_launcher.py
      - uses: actions/upload-artifact@v4
        with:
          name: CallGuard-exe
          path: dist/CallGuard.exe

  apk:
    name: Build Android debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Make gradlew executable
        run: chmod +x ./gradlew
        working-directory: android
      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: android
      - uses: actions/upload-artifact@v4
        with:
          name: CallGuard-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
