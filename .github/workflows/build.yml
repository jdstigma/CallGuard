name: Build CallGuard

on:
  push:
    branches: [ main ]
  workflow_dispatch:      # manual trigger from the Actions tab
  release:
    types: [ published ]  # publishing a release builds the signed APK

jobs:
  exe:
    name: Build Windows .exe
    if: github.event_name != 'release'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - run: pip install pyinstaller pandas matplotlib
      - name: Build CallGuard.exe
        run: >
          pyinstaller --onefile --windowed --name CallGuard
          --paths analysis --paths google_voice
          --hidden-import analyze_calls --hidden-import gvoice_to_csv
          --collect-all pandas --collect-all matplotlib
          callguard_launcher.py
      - uses: actions/upload-artifact@v7
        with:
          name: CallGuard-exe
          path: dist/CallGuard.exe

  apk:
    name: Build Android debug APK
    if: github.event_name != 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - name: Make gradlew executable
        run: chmod +x ./gradlew
        working-directory: android
      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: android
      - uses: actions/upload-artifact@v7
        with:
          name: CallGuard-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

  release-exe:
    name: Build & attach Windows .exe
    if: github.event_name == 'release'
    runs-on: windows-latest
    permissions:
      contents: write        # needed to upload to the release
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - run: pip install pyinstaller pandas matplotlib
      - name: Build CallGuard.exe
        run: >
          pyinstaller --onefile --windowed --name CallGuard
          --paths analysis --paths google_voice
          --hidden-import analyze_calls --hidden-import gvoice_to_csv
          --collect-all pandas --collect-all matplotlib
          callguard_launcher.py
      - name: Attach exe to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release upload "${{ github.event.release.tag_name }}"
          dist/CallGuard.exe
          --repo ${{ github.repository }} --clobber

  release-apk:
    name: Build & attach signed release APK
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write        # needed to upload to the release
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - name: Decode keystore from secret
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "${{ runner.temp }}/release.jks"
      - name: Build signed release APK
        working-directory: android
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon
      - name: Attach signed APK to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release upload "${{ github.event.release.tag_name }}"
          android/app/build/outputs/apk/release/app-release.apk
          --repo ${{ github.repository }} --clobber
